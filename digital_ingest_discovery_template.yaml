AWSTemplateFormatVersion: '2010-09-09'
Description: >
  digital-ingest-discovery

  Discovers new packages.

Parameters:
  ContainerAccountId:
    Type: String
    Description: Account ID under which container repository is located.
    Default: "817658541382"
  ApplicationEnvironment:
    Type: String
    Description: Environment in which application should be deployed.
    AllowedValues:
      - dev
      - prod
  ApplicationName:
    Type: String
    Description: Name of the application to be deployed.
  ArchivesSpaceBaseurl:
    Type: String
    Description: Base URL for ArchivesSpace.
  ArchivesSpaceUsername:
    Type: String
    Description: Username for ArchivesSpace.
  ArchivesSpacePassword:
    Type: String
    Description: Password for ArchivesSpace.
  AssemblyBucketName:
    Type: String
    Description: Name of bucket for temporary storage.
  EbsStorageMountPath:
    Type: String
    Description: Path at which EBS volume is mounted
  SourceBucketName:
    Type: String 
    Description: Name of S3 bucket to which source files are uploadad.
  IiifBucketName:
    Type: String
    Description: Name of S3 bucket to deliver packages for IIIF processing.
  EventsTopicArn:
    Type: String
    Description: ARN for events SNS Topic.
  Workload:
    Type: String
    Description: Name of workload for this stack.

Resources:
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      Tags:
        - Key: Environment
          Value: !Ref ApplicationEnvironment
        - Key: Application
          Value: !Ref ApplicationName
        - Key: Workload
          Value: !Ref Workload
        - Key: WorkloadType
          Value: processing
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs-tasks.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      Policies:
        - PolicyName: LogPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: 
                  - !GetAtt DiscoveryLogGroup.Arn
        - PolicyName: EcrPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 
                  - 'ecr:BatchCheckLayerAvailability'
                  - 'ecr:GetDownloadUrlForLayer'
                  - 'ecr:BatchGetImage'
                Resource: 
                  - !Sub arn:${AWS::Partition}:ecr:${AWS::Region}:${ContainerAccountId}:repository/${ApplicationName}
              - Effect: Allow
                Action:
                  - 'ecr:GetAuthorizationToken'
                Resource: '*'
        - PolicyName: SSMPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ssm:GetParameters'
                Resource:
                  - !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ApplicationEnvironment}/${ApplicationName}/*

  DiscoveryUser:
    Type: AWS::IAM::User
    Properties:
      Tags:
        - Key: Environment
          Value: !Ref ApplicationEnvironment
        - Key: Application
          Value: !Ref ApplicationName
        - Key: Workload
          Value: !Ref Workload
        - Key: WorkloadType
          Value: processing

  DiscoveryUserAccessKey:
    Type: AWS::IAM::AccessKey
    Properties: 
      UserName: !Ref DiscoveryUser

  DiscoveryS3Role:
    Type: AWS::IAM::Role
    Properties:
      Tags:
        - Key: Environment
          Value: !Ref ApplicationEnvironment
        - Key: Application
          Value: !Ref ApplicationName
        - Key: Workload
          Value: !Ref Workload
        - Key: WorkloadType
          Value: processing
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !GetAtt DiscoveryUser.Arn
            Action:
              - 'sts:AssumeRole'
      Description: 'Allows access to S3 Buckets.'
      Policies:
        - PolicyName: SourceBucketPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:GetObject'
                  - 's3:DeleteObject'
                Resource:
                  - !Sub arn:${AWS::Partition}:s3:::${SourceBucketName}/*
              - Effect: Allow
                Action: 
                  - 's3:ListBucket'
                Resource: 
                  - !Sub arn:${AWS::Partition}:s3:::${SourceBucketName}
        - PolicyName: IiifBucketPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:PutObject'
                Resource:
                  - !Sub arn:${AWS::Partition}:s3:::${IiifBucketName}/*
                  - !Sub arn:${AWS::Partition}:s3:::${AssemblyBucketName}/*

  DiscoverySnsRole:
    Type: AWS::IAM::Role
    Properties:
      Tags:
        - Key: Environment
          Value: !Ref ApplicationEnvironment
        - Key: Application
          Value: !Ref ApplicationName
        - Key: Workload
          Value: !Ref Workload
        - Key: WorkloadType
          Value: processing
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !GetAtt DiscoveryUser.Arn
            Action:
              - 'sts:AssumeRole'
      Description: 'Allows publication of SNS messages.'
      Policies:
        - PolicyName: DiscoverySNSPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 
                  - 'sns:Publish'
                Resource:
                  - !Ref EventsTopicArn

  DiscoveryLogGroup:
    Type: AWS::Logs::LogGroup
    Properties: 
      Tags:
        - Key: Environment
          Value: !Ref ApplicationEnvironment
        - Key: Application
          Value: !Ref ApplicationName
        - Key: Workload
          Value: !Ref Workload
        - Key: WorkloadType
          Value: processing
      LogGroupName: !Sub "/rac/${ApplicationEnvironment}/digital_ingest/ecs/${ApplicationName}"
      RetentionInDays: 90

  DiscoveryUserIdParameter:
    Type: AWS::SSM::Parameter
    Properties: 
      Description: Secret Access Key ID for DiscoveryUser.
      Name: !Sub /${ApplicationEnvironment}/${ApplicationName}/AWS_ACCESS_KEY_ID
      Tags: 
        Environment: !Ref ApplicationEnvironment
        Application: !Ref ApplicationName
        Workload: !Ref Workload
        WorkloadType: processing
      Type: String
      Value: !Ref DiscoveryUserAccessKey

  DiscoveryUserKeyParameter:
    Type: AWS::SSM::Parameter
    Properties: 
      Description: Secret Access Key for DiscoveryUser.
      Name: !Sub /${ApplicationEnvironment}/${ApplicationName}/AWS_SECRET_ACCESS_KEY
      Tags: 
        Environment: !Ref ApplicationEnvironment
        Application: !Ref ApplicationName
        Workload: !Ref Workload
        WorkloadType: processing
      Type: String
      Value: !GetAtt DiscoveryUserAccessKey.SecretAccessKey
  
  DiscoveryEcsTask:
    Type: AWS::ECS::TaskDefinition
    Properties: 
      Cpu: "1024"
      Memory: "3072"
      ContainerDefinitions: 
        - Name: !Ref ApplicationName
          Image: !Sub "${ContainerAccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ApplicationName}:${ApplicationEnvironment}"
          Essential: true
          Environment:
            - Name: ENV
              Value: !Ref ApplicationEnvironment
            - Name: AS_BASEURL
              Value: !Ref ArchivesSpaceBaseurl
            - Name: AS_USERNAME
              Value: !Ref ArchivesSpaceUsername
            - Name: AS_PASSWORD
              Value: !Ref ArchivesSpacePassword
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: AWS_S3_ROLE_ARN
              Value: !GetAtt DiscoveryS3Role.Arn
            - Name: AWS_SNS_ROLE_ARN
              Value: !GetAtt DiscoverySnsRole.Arn
            - Name: AWS_ASSEMBLY_BUCKET
              Value: !Ref AssemblyBucketName
            - Name: EBS_PATH
              Value: !Ref EbsStorageMountPath
            - Name: AWS_SOURCE_BUCKET
              Value: !Ref SourceBucketName
            - Name: AWS_SNS_TOPIC
              Value: !Ref EventsTopicArn
            - Name: AWS_IIIF_BUCKET
              Value: !Ref IiifBucketName
          MountPoints:
            - SourceVolume: ebs
              ContainerPath: !Ref EbsStorageMountPath
              ReadOnly: false
          ReadonlyRootFilesystem: true
          Secrets:
            - Name: AWS_ACCESS_KEY_ID
              ValueFrom: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${DiscoveryUserIdParameter}'
            - Name: AWS_SECRET_ACCESS_KEY
              ValueFrom: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${DiscoveryUserKeyParameter}'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              "awslogs-group": !Ref DiscoveryLogGroup
              "awslogs-region": !Ref AWS::Region
              "awslogs-stream-prefix": "ecs"
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      Family: !Ref ApplicationName
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      Tags:
        - Key: Environment
          Value: !Ref ApplicationEnvironment
        - Key: Application
          Value: !Ref ApplicationName
        - Key: Workload
          Value: !Ref Workload
        - Key: WorkloadType
          Value: processing
      Volumes: 
        - Name: ebs
          ConfiguredAtLaunch: true
Outputs:
  DiscoveryArn:
    Description: Discovery ECS Task Definition ARN
    Value: !Ref DiscoveryEcsTask