AWSTemplateFormatVersion: '2010-09-09'
Description: >
  digital-ingest-notifications

  Handles notifications for events generated by digital ingest pipeline.

Parameters:
  ApplicationEnvironment:
    Type: String
    Description: The environment in which the application should be deployed.
    AllowedValues:
      - dev
      - prod
  ApplicationName:
    Type: String
    Description: The name of the application to be deployed.
  EventsTopicArn:
    Type: String
    Description: ARN for event SNS Topic
  NotificationsQueueArn:
    Type: String
    Description: ARN for notifications SQS Queue
  ZodiacBaseurl:
    Type: String
    Description: Base URL for Zodiac API.

Resources:
  ZodiacBaseurlParam:
    Type: AWS::SSM::Parameter
    Properties: 
      AllowedPattern: "^[A-Za-z0-9\\-\\_]+$"
      Description: Base URL for Zodiac API.
      Name: !Sub /${ApplicationEnvironment}/${ApplicationName}/ZODIAC_BASEURL
      Tags: 
        Environment: !Ref ApplicationEnvironment
        Application: !Ref ApplicationName
      Type: String
      Value: !Ref ZodiacBaseurl
  SnsTopicParam:
    Type: AWS::SSM::Parameter
    Properties: 
      AllowedPattern: "^[A-Za-z0-9\\-\\_]+$"
      Description: ARN for SNS topic to send messages to.
      Name: !Sub /${ApplicationEnvironment}/${ApplicationName}/SNS_TOPIC
      Tags: 
        Environment: !Ref ApplicationEnvironment
        Application: !Ref ApplicationName
      Type: String
      Value: !Ref EventsTopicArn

  DigitalIngestNotificationsRole:
    Type: AWS::IAM::Role
    Properties: 
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      Description: !Sub 'Allows ${ApplicationName} lambda to be executed successfully.'
      Policies:
        - PolicyName: DigitalIngestNotificationsParameterStorePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 
                  - 'ssm:GetParametersByPath*'
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ApplicationEnvironment}/${ApplicationName}*'
        - PolicyName: DigitalIngestNotificationsLogPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource:
                  - !GetAtt NotificationsLogGroup.Arn
        - PolicyName: DigitalIngestNotificationsSQSPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'sqs:ReceiveMessage'
                  - 'sqs:DeleteMessage'
                  - 'sqs:GetQueueAttributes'
                Resource: !Ref NotificationsQueueArn
        - PolicyName: DigitalIngestNotificationsSNSPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'sns:Publish'
                Resource:
                  - !Ref EventsTopicArn

  DigitalIngestNotificationsFunction:
    Type: AWS::Lambda::Function
    Properties:
      Code:
        S3Bucket: !Sub 'rac-${ApplicationEnvironment}-lambda'
        S3Key: !Sub '${ApplicationName}.zip'
      FunctionName: !Ref ApplicationName
      Handler: handle_digital_ingest_notifications.lambda_handler
      LoggingConfig:
        LogGroup: !Ref NotificationsLogGroup
      Role: !GetAtt DigitalIngestNotificationsRole.Arn
      Runtime: python3.11
      Timeout: 30
      Environment:
        Variables:
          ENV: !Ref ApplicationEnvironment
          APP_CONFIG_PATH: !Ref ApplicationName
          AWS_ROLE_ARN: !GetAtt DigitalIngestNotificationsRole.Arn
          AWS_REGION: !Ref AWS::Region
      Tags:
        - Key: Environment
          Value: !Ref ApplicationEnvironment
        - Key: Application
          Value: !Ref ApplicationName
      Architectures:
        - x86_64

  NotificationsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ApplicationName}"
      RetentionInDays: 90

  DigitalIngestNotificationsEventSourceMapping:
    Type: AWS::Lambda:EventSourceMapping
    Properties:
      EventSourceArn: !Ref NotificationsQueueArn
      FunctionName: !GetAtt DigitalIngestNotificationsFunction.Arn

Outputs:
  DigitalIngestNotificationsFunction:
    Description: 'Digital Ingest Notifications Lambda Function ARN'
    Value: !GetAtt DigitalIngestNotificationsFunction.Arn