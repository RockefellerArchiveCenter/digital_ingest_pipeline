AWSTemplateFormatVersion: '2010-09-09'
Description: >
  digital-ingest-trigger

  Provides an endpoint for Archivematica post-store callbacks.

Parameters:
  ApplicationEnvironment:
    Type: String
    Description: Environment in which the application should be deployed.
    AllowedValues:
      - dev
      - prod
  ApplicationName:
    Type: String
    Description: Name of the application to be deployed.
  NotificationsTopicArn:
    Type: String
    Description: ARN for the SNS queue to post messages to.
  ArchivematicaApiKey:
    Type: String
    Description: API key that will be delivered with webhook requests
  SecurityGroup:
    Type: String
    Description: Security Group ID.
  Subnet:
    Type: String
    Description: Subnet ID.
  VpcId:
    Type: String
    Description: Identifier for VPC in which this infrastructure should sit.
  Workload:
    Type: String
    Description: Name of workload for this stack.

Resources:
  AwsRoleArnParameter:
    Type: AWS::SSM::Parameter
    Properties: 
      Description: ARN for role with permissions for lambda.
      Name: !Sub /${ApplicationEnvironment}/${ApplicationName}/AWS_ROLE_ARN
      Tags: 
        Environment: !Ref ApplicationEnvironment
        Application: !Ref ApplicationName
        Workload: !Ref Workload
        WorkloadType: processing
      Type: String
      Value: !GetAtt  DigitalIngestWebhookFunctionRole.Arn
  AwsSnsTopicParameter:
    Type: AWS::SSM::Parameter
    Properties: 
      Description: ARN for SNS topic to post messages to.
      Name: !Sub /${ApplicationEnvironment}/${ApplicationName}/AWS_SNS_TOPIC
      Tags: 
        Environment: !Ref ApplicationEnvironment
        Application: !Ref ApplicationName
        Workload: !Ref Workload
        WorkloadType: processing
      Type: String
      Value: !Ref NotificationsTopicArn
  ArchivematicaApiKeyParameter:
    Type: AWS::SSM::Parameter
    Properties: 
      Description: Zodiac base URL.
      Name: !Sub /${ApplicationEnvironment}/${ApplicationName}/ARCHIVEMATICA_API_KEY
      Tags: 
        Environment: !Ref ApplicationEnvironment
        Application: !Ref ApplicationName
        Workload: !Ref Workload
        WorkloadType: processing
      Type: String
      Value: !Ref ArchivematicaApiKey

  DigitalIngestWebhookFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      Tags:
        - Key: Environment
          Value: !Ref ApplicationEnvironment
        - Key: Application
          Value: !Ref ApplicationName
        - Key: Workload
          Value: !Ref Workload
        - Key: WorkloadType
          Value: processing
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      Description: IAM Role which supports running ECS Tasks and Services.
      Policies: 
        - PolicyName: DigitalIngestWebhookParameterStorePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 
                  - 'ssm:GetParametersByPath*'
                Resource: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ApplicationEnvironment}/${ApplicationName}*'
        - PolicyName: DigitalIngestWebhookLogPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: !GetAtt WebhookLogGroup.Arn
        - PolicyName: DigitalIngestWebhookSNSPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 
                  - 'sns:Publish'
                Resource: !Ref NotificationsTopicArn
        - PolicyName: DigitalIngestWebhookEc2Policy
          PolicyDocument: 
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 
                  - "ec2:CreateNetworkInterface"
                  - "ec2:DescribeNetworkInterfaces"
                  - "ec2:DescribeSubnets"
                  - "ec2:DeleteNetworkInterface"
                  - "ec2:AssignPrivateIpAddresses"
                  - "ec2:UnassignPrivateIpAddresses"
                Resource: "*"

  DigitalIngestWebhookFunction:
    Type: AWS::Lambda::Function
    Properties:
      Code:
        S3Bucket: !Sub 'rac-${ApplicationEnvironment}-lambda'
        S3Key: !Sub '${ApplicationName}.zip'
      FunctionName: !Ref ApplicationName
      Handler: handle_http_request.lambda_handler
      LoggingConfig:
        LogGroup: !Ref WebhookLogGroup
      Role: !GetAtt DigitalIngestWebhookFunctionRole.Arn
      Runtime: python3.11
      Timeout: 10
      Environment:
        Variables:
          ENV: !Ref ApplicationEnvironment
          APP_CONFIG_PATH: !Ref ApplicationName
      Architectures:
        - x86_64
      VpcConfig:
        SecurityGroupIds:
          - !Ref SecurityGroup
        SubnetIds:
          - !Ref Subnet
      Tags:
        - Key: Environment
          Value: !Ref ApplicationEnvironment
        - Key: Application
          Value: !Ref ApplicationName
        - Key: Workload
          Value: !Ref Workload
        - Key: WorkloadType
          Value: processing

  DigitalIngestWebhookFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref DigitalIngestWebhookFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${WebhookApiGateway}/*

  WebhookApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      EndpointAccessMode: STRICT
      EndpointConfiguration:
        IpAddressType: dualstack
        Types: 
          - PRIVATE
      Name: webhook-api
      Policy:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal: "*"
            Action: "execute-api:Invoke"
            Resource: "execute-api:/*"
            Condition:
              StringNotEquals:
                aws:SourceVpc: !Ref VpcId
          - Effect: Allow
            Principal: "*"
            Action: "execute-api:Invoke"
            Resource: "execute-api:/*"
      SecurityPolicy: SecurityPolicy_TLS13_1_2_2021_06
      Tags:
        - Key: Environment
          Value: !Ref ApplicationEnvironment
        - Key: Application
          Value: !Ref ApplicationName
        - Key: Workload
          Value: !Ref Workload
        - Key: WorkloadType
          Value: processing

  WebhookApiGatewayRootMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: NONE
      HttpMethod: POST
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub
          - arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations
          - lambdaArn: !GetAtt DigitalIngestWebhookFunction.Arn
      ResourceId: !GetAtt WebhookApiGateway.RootResourceId
      RestApiId: !Ref WebhookApiGateway 

  WebhookApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - WebhookApiGatewayRootMethod
    Properties:
      RestApiId: !Ref WebhookApiGateway
      StageName: !Ref ApplicationEnvironment

  WebhookEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Allow HTTPS inbound traffic from 10.0.2.0/24'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 0
          ToPort: 443
          CidrIp: 10.0.2.0/24
          Description: 'Allow HTTPS from digital ingest subnet'
      Tags:
        - Key: Name
          Value: digital-ingest-webhook-sg

  WebhookVpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      PrivateDnsEnabled: true
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: 'execute-api:Invoke'
            Principal: "*"
            Resource: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${WebhookApiGateway}/*
      SecurityGroupIds:
        - !Ref WebhookEndpointSecurityGroup
      ServiceName: com.amazonaws.us-east-1.execute-api
      ServiceRegion: us-east-1
      SubnetIds:
        - !Ref Subnet
      VpcEndpointType: Interface
      VpcId: !Ref VpcId
      Tags:
        - Key: Environment
          Value: !Ref ApplicationEnvironment
        - Key: Application
          Value: !Ref ApplicationName
        - Key: Workload
          Value: !Ref Workload
        - Key: WorkloadType
          Value: processing
        - Key: Name
          Value: digital-ingest-webhook-endpoint

  WebhookLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      Tags:
        - Key: Environment
          Value: !Ref ApplicationEnvironment
        - Key: Application
          Value: !Ref ApplicationName
        - Key: Workload
          Value: !Ref Workload
        - Key: WorkloadType
          Value: processing
      LogGroupName: !Sub "/aws/lambda/${ApplicationName}"
      RetentionInDays: 90

Outputs:
  DigitizedImageTriggerFunction:
    Description: "Digital Ingest Webhook Lambda Function ARN"
    Value: !GetAtt DigitalIngestWebhookFunction.Arn
